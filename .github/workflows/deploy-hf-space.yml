name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-deploy-main
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  HF_SPACE_REPO: AbhinavGavireddi/inkPersona

jobs:
  test:
    name: Test InkPersona
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Run Python verification
        run: uv run pytest

  deploy:
    name: Deploy to Hugging Face Space
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export Hugging Face requirements from uv project
        run: |
          uv lock --check
          uv export --no-dev --format requirements-txt --no-hashes --output-file requirements.txt

      - name: Push current main to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing required GitHub Actions secret: HF_TOKEN"
            echo "Create a Hugging Face write token, then add it in GitHub repo Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add hf "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" || \
            git remote set-url hf "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"

          # Hugging Face Spaces often start with an initial commit that is not in
          # the GitHub repo. GitHub is the source of truth for this project, so
          # deploy by updating the Space branch from the tested GitHub commit.
          # --force-with-lease prevents clobbering a newer HF commit made after
          # this job fetched the branch.
          git fetch hf main:refs/remotes/hf/main || true
          git push --force-with-lease hf HEAD:main
